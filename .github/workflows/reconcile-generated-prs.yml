name: Reconcile generated PRs

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  reconcile:
    runs-on: ubuntu-latest

    steps:
      - name: Normalize generated PR metadata
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- generated-pr-reconciler-normalized -->';
            const sourceMarkerPattern = /^Generated from `?data\/events\/\d{4}-\d{2}-\d{2}\.json`?\.?$/;

            function collectDates(value, patterns) {
              const dates = [];
              const text = String(value || '');
              for (const pattern of patterns) {
                for (const match of text.matchAll(pattern)) {
                  dates.push(match[1]);
                }
              }
              return dates;
            }

            function latestDate(dates) {
              return [...new Set(dates)].sort().at(-1) || null;
            }

            function resolveDateKey(pr, files) {
              const headDate = latestDate(collectDates(pr.head?.ref, [
                /digest-automation-request-(\d{4}-\d{2}-\d{2})/g,
                /(\d{4}-\d{2}-\d{2})/g,
              ]));
              if (headDate) return headDate;

              const bodyDate = latestDate(collectDates(pr.body, [
                /<issue_title>Digest automation request: (\d{4}-\d{2}-\d{2})<\/issue_title>/g,
                /Digest automation request:\s*(\d{4}-\d{2}-\d{2})/g,
                /data\/events\/(\d{4}-\d{2}-\d{2})\.json/g,
              ]));
              if (bodyDate) return bodyDate;

              const titleDate = latestDate(collectDates(pr.title, [/(\d{4}-\d{2}-\d{2})/g]));
              if (titleDate) return titleDate;

              return latestDate(files.flatMap((file) => collectDates(file.filename, [
                /^data\/events\/(\d{4}-\d{2}-\d{2})\.json$/g,
                /^summaries\/daily\/(\d{4}-\d{2}-\d{2})\.md$/g,
              ])));
            }

            async function upsertPrComment(prNumber, body) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              });
              const existing = comments.find((comment) => comment.body?.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
                return;
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const automationIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'digest-automation',
              per_page: 100,
            });

            let normalizedCount = 0;
            for (const pr of pulls) {
              const labels = new Set((pr.labels || []).map((label) => label.name));
              const isGeneratedPr =
                labels.has('auto-pr') ||
                /copilot/i.test(pr.user?.login || '') ||
                /copilot/i.test(pr.head?.ref || '') ||
                /Digest automation request:|Generated from `?data\/events\//.test(pr.body || '');
              if (!isGeneratedPr) continue;

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });
              const dateKey = resolveDateKey(pr, files);
              if (!dateKey) continue;

              const expectedTitle = `chore: improve digest automation ${dateKey}`;
              const expectedMarkerLine = `Generated from data/events/${dateKey}.json`;
              const bodyLines = String(pr.body || '')
                .split(/\r?\n/)
                .filter((line) => !sourceMarkerPattern.test(line.trim()));
              let nextBody = [expectedMarkerLine, '', ...bodyLines]
                .join('\n')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
              const linkedIssue = automationIssues.find((issue) =>
                !issue.pull_request && issue.title === `Digest automation request: ${dateKey}`,
              );
              if (
                linkedIssue &&
                !new RegExp(`(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\\s+#${linkedIssue.number}\\b`, 'i').test(nextBody)
              ) {
                nextBody = [nextBody, '', `Closes #${linkedIssue.number}`].filter(Boolean).join('\n');
              }

              if (!labels.has('copilot') || !labels.has('auto-pr')) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: ['copilot', 'auto-pr'],
                });
              }

              if (pr.title !== expectedTitle || nextBody !== (pr.body || '')) {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  title: expectedTitle,
                  body: nextBody,
                });
                await upsertPrComment(
                  pr.number,
                  [
                    marker,
                    `Normalized generated PR metadata for ${dateKey}.`,
                    '- Title, source marker, labels, and linked issue reference were aligned by the reconciler.',
                  ].join('\n'),
                );
                normalizedCount += 1;
              }
            }

            if (normalizedCount === 0) {
              core.info('No generated PR metadata needed normalization.');
            } else {
              core.info(`Normalized ${normalizedCount} generated PR(s).`);
            }

      - name: Close stale no-op generated PRs
        uses: actions/github-script@v8
        with:
          script: |
            const staleMinutes = 60;
            const staleCutoff = Date.now() - staleMinutes * 60 * 1000;
            const marker = '<!-- generated-pr-reconciler -->';
            const titlePattern = /^chore: improve digest automation \d{4}-\d{2}-\d{2}$/;
            const bodyPattern = /^Generated from `?data\/events\/\d{4}-\d{2}-\d{2}\.json`?/m;

            async function upsertPrComment(prNumber, body) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              });
              const existing = comments.find((comment) => comment.body?.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

            async function getLinkedIssueNumbers(prNumber, bodyText) {
              const issueNumbers = new Set(
                [...String(bodyText || '').matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/gi)]
                  .map((match) => Number(match[1]))
                  .filter((value) => Number.isInteger(value)),
              );

              try {
                const result = await github.graphql(
                  `query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        closingIssuesReferences(first: 50) { nodes { number } }
                      }
                    }
                  }`,
                  { owner: context.repo.owner, repo: context.repo.repo, number: prNumber },
                );
                for (const issue of result.repository.pullRequest.closingIssuesReferences.nodes || []) {
                  if (Number.isInteger(issue.number)) issueNumbers.add(issue.number);
                }
              } catch (error) {
                core.warning(`Failed to read closing issue references for PR #${prNumber}: ${error.message}`);
              }

              return [...issueNumbers];
            }

            async function closeLinkedIssues(bodyText, prNumber) {
              const issueNumbers = await getLinkedIssueNumbers(prNumber, bodyText);

              for (const issueNumber of issueNumbers) {
                try {
                  const issue = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                  });

                  if (issue.data.state !== 'open') {
                    continue;
                  }

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: [
                      marker,
                      `Closed automatically because generated PR #${prNumber} remained a draft with no file changes for more than ${staleMinutes} minutes.`,
                    ].join('\n'),
                  });

                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    state: 'closed',
                  });
                } catch (error) {
                  core.warning(`Failed to close linked issue #${issueNumber}: ${error.message}`);
                }
              }
            }

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            let closedCount = 0;

            for (const pr of pulls) {
              const labels = new Set((pr.labels || []).map((label) => label.name));
              const isGeneratedPr = labels.has('auto-pr') || /copilot/i.test(pr.user?.login || '');
              const createdAt = Date.parse(pr.created_at || 0);
              const isStale = Number.isFinite(createdAt) && createdAt < staleCutoff;

              if (!isGeneratedPr || !pr.draft || !isStale) {
                continue;
              }

              if (!titlePattern.test(pr.title || '') || !bodyPattern.test(pr.body || '')) {
                continue;
              }

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });

              if (files.length > 0) {
                continue;
              }

              const commentBody = [
                marker,
                `Closed automatically because this generated PR remained a draft with no file changes for more than ${staleMinutes} minutes.`,
                '- A future collection run can open a new automation issue if work is still needed.',
              ].join('\n');

              await upsertPrComment(pr.number, commentBody);
              await closeLinkedIssues(pr.body || '', pr.number);
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: 'closed',
              });
              closedCount += 1;
              core.info(`Closed stale no-op generated PR #${pr.number}.`);
            }

            if (closedCount === 0) {
              core.info('No stale no-op generated PRs needed reconciliation.');
            }

      - name: Auto-merge stuck generated PRs
        uses: actions/github-script@v8
        with:
          script: |
            const stuckMinutes = 120;
            const stuckCutoff = Date.now() - stuckMinutes * 60 * 1000;
            const marker = '<!-- generated-pr-reconciler -->';
            const titlePattern = /^chore: improve digest automation (\d{4}-\d{2}-\d{2})$/;
            const bodyPattern = /^Generated from `?data\/events\/\d{4}-\d{2}-\d{2}\.json`?/m;
            const allowed = [
              /^scripts\/collect\.mjs$/,
              /^scripts\/generate-drafts\.mjs$/,
              /^scripts\/lib\/reporting\.mjs$/,
              /^config\/sources\.json$/,
              /^config\/summary-ja-cache\.json$/,
              /^data\/events\/.*\.json$/,
              /^summaries\/daily\/.*\.md$/,
              /^drafts\/articles\/daily\/.*\.md$/,
              /^drafts\/posts\/x\/.*\.md$/,
              /^data\/state\.json$/,
              /^data\/run-summary\.json$/,
            ];

            async function getLinkedIssueNumbers(prNumber, bodyText) {
              const issueNumbers = new Set(
                [...String(bodyText || '').matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/gi)]
                  .map((match) => Number(match[1]))
                  .filter((value) => Number.isInteger(value)),
              );

              try {
                const result = await github.graphql(
                  `query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        closingIssuesReferences(first: 50) { nodes { number } }
                      }
                    }
                  }`,
                  { owner: context.repo.owner, repo: context.repo.repo, number: prNumber },
                );
                for (const issue of result.repository.pullRequest.closingIssuesReferences.nodes || []) {
                  if (Number.isInteger(issue.number)) issueNumbers.add(issue.number);
                }
              } catch (error) {
                core.warning(`Failed to read closing issue references for PR #${prNumber}: ${error.message}`);
              }

              return [...issueNumbers];
            }

            async function closeLinkedIssues(bodyText, prNumber, reason) {
              for (const issueNumber of await getLinkedIssueNumbers(prNumber, bodyText)) {
                try {
                  const issue = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                  });
                  if (issue.data.state !== 'open') continue;

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: [marker, reason].join('\n'),
                  });
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    state: 'closed',
                  });
                } catch (error) {
                  core.warning(`Failed to close linked issue #${issueNumber}: ${error.message}`);
                }
              }
            }

            async function generatedPrChecksArePassing(prNumber) {
              const { data: pull } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              if (pull.mergeable_state && !['clean', 'has_hooks', 'unstable'].includes(pull.mergeable_state)) {
                core.info(`PR #${prNumber} mergeable_state is ${pull.mergeable_state}; skipping auto-merge.`);
                return false;
              }

              const checks = await github.paginate(github.rest.checks.listForRef, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pull.head.sha,
                per_page: 100,
              });
              const relevantChecks = checks.filter((check) =>
                ['Validate generated PR', 'Request Copilot review', 'GitGuardian Security Checks'].includes(check.name) ||
                check.app?.slug === 'github-actions',
              );
              const incomplete = relevantChecks.filter((check) => check.status !== 'completed');
              const failed = relevantChecks.filter((check) =>
                !['success', 'neutral', 'skipped'].includes(check.conclusion || ''),
              );

              if (incomplete.length > 0 || failed.length > 0) {
                core.info(
                  `PR #${prNumber} has non-passing checks: ${[...incomplete, ...failed]
                    .map((check) => `${check.name}:${check.status}/${check.conclusion || 'none'}`)
                    .join(', ')}`,
                );
                return false;
              }

              return relevantChecks.some((check) => check.name === 'validate' && check.conclusion === 'success');
            }

            async function closeStaleConflictedGeneratedPr(pr, dateKey) {
              const staleHours = 24;
              const createdAt = Date.parse(pr.created_at || 0);
              const isOldEnough = Number.isFinite(createdAt) && (Date.now() - createdAt) > staleHours * 60 * 60 * 1000;
              if (!isOldEnough) return false;

              const { data: pull } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });
              const isConflicted = pull.mergeable === false || pull.mergeable_state === 'dirty';
              if (!isConflicted) return false;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [marker, `Closed automatically because this generated PR has merge conflicts and has been open for more than ${staleHours} hours. A future collection run will create a fresh automation issue.`].join('\n'),
              });
              await closeLinkedIssues(pr.body || '', pr.number, `Closed because generated PR #${pr.number} had merge conflicts.`);
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: 'closed',
              });
              core.info(`Closed stale conflicted generated PR #${pr.number} for ${dateKey}.`);
              return true;
            }

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            // Group generated PRs by date key; keep the newest per date
            const byDate = new Map();
            for (const pr of pulls) {
              const labels = new Set((pr.labels || []).map((l) => l.name));
              if (!labels.has('auto-pr') && !/copilot/i.test(pr.user?.login || '')) continue;
              const match = titlePattern.exec(pr.title || '');
              if (!match) continue;
              const dateKey = match[1];
              const existing = byDate.get(dateKey);
              if (!existing || pr.number > existing.pr.number) {
                byDate.set(dateKey, { pr, labels, dateKey });
              }
            }

            // Close older duplicate PRs for the same date
            for (const pr of pulls) {
              const labels = new Set((pr.labels || []).map((l) => l.name));
              if (!labels.has('auto-pr') && !/copilot/i.test(pr.user?.login || '')) continue;
              const match = titlePattern.exec(pr.title || '');
              if (!match) continue;
              const dateKey = match[1];
              const best = byDate.get(dateKey);
              if (best && pr.number < best.pr.number) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: [marker, `Closed as duplicate. PR #${best.pr.number} is the newer automation PR for ${dateKey}.`].join('\n'),
                });
                await closeLinkedIssues(pr.body || '', pr.number, `Superseded by PR #${best.pr.number}.`);
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  state: 'closed',
                });
                core.info(`Closed duplicate generated PR #${pr.number} for ${dateKey} (kept #${best.pr.number}).`);
              }
            }

            // Auto-merge stuck PRs that meet all criteria
            let mergedCount = 0;
            for (const { pr, labels, dateKey } of byDate.values()) {
              if (await closeStaleConflictedGeneratedPr(pr, dateKey)) continue;
              if (pr.draft) continue;
              if (labels.has('needs-human-review')) continue;
              if (!bodyPattern.test(pr.body || '')) continue;

              const createdAt = Date.parse(pr.created_at || 0);
              if (!Number.isFinite(createdAt) || createdAt >= stuckCutoff) continue;

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });
              if (files.length === 0) continue;

              const blocked = files
                .map((f) => f.filename)
                .filter((f) => !allowed.some((p) => p.test(f)));
              if (blocked.length > 0) {
                core.info(`PR #${pr.number} has disallowed files: ${blocked.join(', ')}. Skipping auto-merge.`);
                continue;
              }

              if (!(await generatedPrChecksArePassing(pr.number))) {
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                });
                await closeLinkedIssues(pr.body || '', pr.number, `Merged automatically by reconciler (PR #${pr.number}).`);
                mergedCount += 1;
                core.info(`Auto-merged stuck generated PR #${pr.number} for ${dateKey}.`);

                // Dispatch pages deploy after merge
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: 'deploy-pages.yml',
                    ref: 'main',
                  });
                } catch (deployError) {
                  core.warning(`Failed to dispatch pages deploy after merging #${pr.number}: ${deployError.message}`);
                }
              } catch (mergeError) {
                const isConflict = /merge conflict/i.test(mergeError.message || '');
                const staleHours = 24;
                const isOldEnough = (Date.now() - Date.parse(pr.created_at || 0)) > staleHours * 60 * 60 * 1000;
                if (isConflict && isOldEnough) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    body: [marker, `Closed automatically because this generated PR has merge conflicts and has been open for more than ${staleHours} hours. A future collection run will create a fresh automation issue.`].join('\n'),
                  });
                  await closeLinkedIssues(pr.body || '', pr.number, `Closed because generated PR #${pr.number} had merge conflicts.`);
                  await github.rest.pulls.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    state: 'closed',
                  });
                  core.info(`Closed conflicted generated PR #${pr.number} for ${dateKey}.`);
                } else {
                  core.warning(`Failed to auto-merge PR #${pr.number}: ${mergeError.message}`);
                }
              }
            }

            if (mergedCount === 0) {
              core.info('No stuck generated PRs needed auto-merge.');
            } else {
              core.info(`Auto-merged ${mergedCount} stuck generated PR(s).`);
            }

      - name: Close orphaned automation issues
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- generated-pr-reconciler -->';
            const staleHours = 48;
            const staleCutoff = Date.now() - staleHours * 60 * 60 * 1000;
            const issueTitlePattern = /^Digest automation request: \d{4}-\d{2}-\d{2}$/;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'digest-automation',
              per_page: 100,
            });

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            async function getLinkedIssueNumbers(pr) {
              const issueNumbers = new Set(
                [...String(pr.body || '').matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/gi)]
                  .map((match) => Number(match[1]))
                  .filter((value) => Number.isInteger(value)),
              );

              try {
                const result = await github.graphql(
                  `query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        closingIssuesReferences(first: 50) { nodes { number } }
                      }
                    }
                  }`,
                  { owner: context.repo.owner, repo: context.repo.repo, number: pr.number },
                );
                for (const issue of result.repository.pullRequest.closingIssuesReferences.nodes || []) {
                  if (Number.isInteger(issue.number)) issueNumbers.add(issue.number);
                }
              } catch (error) {
                core.warning(`Failed to read closing issue references for PR #${pr.number}: ${error.message}`);
              }

              return issueNumbers;
            }

            const openLinkedIssueNumbers = new Set();
            for (const pr of openPulls) {
              for (const issueNumber of await getLinkedIssueNumbers(pr)) {
                openLinkedIssueNumbers.add(issueNumber);
              }
            }

            let closedCount = 0;
            for (const issue of issues) {
              if (issue.pull_request) continue;
              if (!issueTitlePattern.test(issue.title || '')) continue;

              const createdAt = Date.parse(issue.created_at || 0);
              if (!Number.isFinite(createdAt) || createdAt >= staleCutoff) continue;

              // Check if any open PR references this issue
              const hasLinkedPr = openLinkedIssueNumbers.has(issue.number);
              if (hasLinkedPr) continue;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [marker, `Closed automatically. No open PR references this issue and it has been open for more than ${staleHours} hours. A future collection run will create a new issue if needed.`].join('\n'),
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              closedCount += 1;
              core.info(`Closed orphaned automation issue #${issue.number}.`);
            }

            if (closedCount === 0) {
              core.info('No orphaned automation issues found.');
            } else {
              core.info(`Closed ${closedCount} orphaned automation issue(s).`);
            }
