name: Rerun blocked Copilot workflows

on:
  workflow_run:
    workflows:
      - Copilot coding agent
      - Request Copilot review
      - Validate generated PR
      - Auto-merge generated PR
    types:
      - completed
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  rerun-blocked:
    runs-on: ubuntu-latest

    steps:
      - name: Rerun recent blocked runs once
        uses: actions/github-script@v8
        with:
          script: |
            const workflowNames = [
              'Request Copilot review',
              'Validate generated PR',
              'Auto-merge generated PR',
            ];
            const cutoff = Date.now() - 60 * 60 * 1000;
            const maxAttempts = 3;
            const workflowRunEvent = context.payload.workflow_run;
            const candidateRuns = [];

            if (workflowRunEvent && workflowNames.includes(workflowRunEvent.name)) {
              candidateRuns.push(workflowRunEvent);
            } else {
              const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });

              const targetWorkflows = workflows.filter((workflow) => workflowNames.includes(workflow.name));
              for (const workflow of targetWorkflows) {
                const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: workflow.id,
                  per_page: 20,
                });
                candidateRuns.push(...runs);
              }
            }

            let rerunCount = 0;
            for (const run of candidateRuns) {
              const createdAt = Date.parse(run.created_at || 0);
              const isRecent = Number.isFinite(createdAt) && createdAt >= cutoff;
              const isBlocked = ['action_required', 'failure'].includes(run.conclusion);
              const canRetry = Number(run.run_attempt ?? 0) < maxAttempts;
              const actorLogin = run.actor?.login || run.triggering_actor?.login || '';
              const isCopilotActor = /copilot/i.test(actorLogin);

              if (!isRecent || !isBlocked || !canRetry || !isCopilotActor) {
                continue;
              }

              await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });
              rerunCount += 1;
              core.info(`Requested rerun for blocked workflow run ${run.id} (${run.name}, attempt ${run.run_attempt}).`);
            }

            if (rerunCount === 0) {
              core.info('No recent blocked Copilot workflow runs needed rerun.');
            }