name: Collect updates

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

permissions:
  actions: write
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect updates
        run: npm run collect

      - name: Commit generated updates
        id: commit
        shell: bash
        run: |
          if git diff --quiet -- data summaries config/summary-ja-cache.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No collected changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data summaries config/summary-ja-cache.json
          git commit -m "chore: collect daily updates"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch Pages deploy
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-pages.yml',
              ref: 'main',
            });
            core.info('Dispatched Deploy GitHub Pages for the latest collected content.');