name: Auto-merge generated PR

on:
  workflow_run:
    workflows:
      - Validate generated PR
    types:
      - completed

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge when PR is safe
        uses: actions/github-script@v8
        with:
          script: |
            // workflow_run.pull_requests is empty when source uses pull_request_target.
            // Fall back to searching by head branch.
            let pullRequests = context.payload.workflow_run.pull_requests || [];
            if (pullRequests.length === 0) {
              const headBranch = context.payload.workflow_run.head_branch;
              if (headBranch) {
                const { data: prs } = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  head: `${context.repo.owner}:${headBranch}`,
                  per_page: 1,
                });
                pullRequests = prs;
              }
            }
            if (pullRequests.length === 0) {
              core.info('No pull request is associated with this workflow run.');
              return;
            }

            const pull = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequests[0].number,
            }).catch((error) => {
              core.info(`PR #${pullRequests[0].number} is no longer accessible: ${error.message}`);
              return null;
            });
            if (!pull) return;
            let pr = pull.data;
            const labels = new Set((pr.labels || []).map((label) => label.name));
            const titlePattern = /^chore: improve digest automation \d{4}-\d{2}-\d{2}$/;
            const requestTitlePattern = /^Digest automation request: \d{4}-\d{2}-\d{2}$/;
            const genericWipTitlePattern = /^\[WIP\] Copilot Request$/;
            const datedWipTitlePattern = /^\[WIP\] .*?(?:\d{4}-\d{2}-\d{2}|[A-Z][a-z]+ \d{1,2}, \d{4})$/;
            const bodyPattern = /Generated from `?data\/events\/\d{4}-\d{2}-\d{2}\.json`?/;
            const allowed = [
              /^scripts\/collect\.mjs$/,
              /^scripts\/generate-drafts\.mjs$/,
              /^scripts\/lib\/reporting\.mjs$/,
              /^config\/sources\.json$/,
              /^config\/summary-ja-cache\.json$/,
              /^data\/events\/.*\.json$/,
              /^summaries\/daily\/.*\.md$/,
              /^drafts\/articles\/daily\/.*\.md$/,
              /^drafts\/posts\/x\/.*\.md$/,
              /^data\/state\.json$/,
              /^data\/run-summary\.json$/,
            ];

            async function getLinkedIssueNumbers(prNumber, bodyText) {
              const issueNumbers = new Set(
                [...String(bodyText || '').matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/gi)]
                  .map((match) => Number(match[1]))
                  .filter((value) => Number.isInteger(value)),
              );

              try {
                const result = await github.graphql(
                  `query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        closingIssuesReferences(first: 50) {
                          nodes { number }
                        }
                      }
                    }
                  }`,
                  {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    number: prNumber,
                  },
                );
                for (const issue of result.repository.pullRequest.closingIssuesReferences.nodes || []) {
                  if (Number.isInteger(issue.number)) issueNumbers.add(issue.number);
                }
              } catch (error) {
                core.warning(`Failed to read closing issue references for PR #${prNumber}: ${error.message}`);
              }

              return [...issueNumbers];
            }

            async function closeLinkedIssues(prNumber, bodyText) {
              const closingRefs = await getLinkedIssueNumbers(prNumber, bodyText);

              for (const issueNumber of closingRefs) {
                try {
                  const issue = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                  });
                  if (issue.data.state !== 'open') {
                    continue;
                  }
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: `<!-- generated-pr-auto-merge -->\nClosed automatically after generated PR #${prNumber} was merged.`,
                  });
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    state: 'closed',
                  });
                } catch (error) {
                  core.warning(`Failed to close linked issue #${issueNumber}: ${error.message}`);
                }
              }
            }

            async function markForHumanReview(reason) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['needs-human-review'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `Auto-merge stopped: ${reason}`,
              });
            }

            if (pr.state !== 'open') {
              core.info(`PR #${pr.number} is not open.`);
              return;
            }

            if (!labels.has('auto-pr') && !(pr.user?.login || '').includes('copilot')) {
              core.info(`PR #${pr.number} is not marked as a generated PR.`);
              return;
            }

            const isPendingNormalization =
              requestTitlePattern.test(pr.title || '') ||
              genericWipTitlePattern.test(pr.title || '') ||
              datedWipTitlePattern.test(pr.title || '');

            if (isPendingNormalization) {
              core.info(`PR #${pr.number} is still waiting for generated metadata normalization.`);
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            if (files.length === 0) {
              core.info(`PR #${pr.number} has no file changes yet. Waiting for Copilot commits.`);
              return;
            }

            const blocked = files
              .map((file) => file.filename)
              .filter((file) => !allowed.some((pattern) => pattern.test(file)));

            if (blocked.length > 0) {
              await markForHumanReview(`PR #${pr.number} changed disallowed files: ${blocked.join(', ')}`);
              return;
            }

            if (!titlePattern.test(pr.title || '')) {
              await markForHumanReview(`PR #${pr.number} title does not match the generated rule: ${pr.title}`);
              return;
            }

            if (!bodyPattern.test(pr.body || '')) {
              await markForHumanReview(`PR #${pr.number} body is missing the source marker.`);
              return;
            }

            if (labels.has('needs-human-review')) {
              core.info(`PR #${pr.number} is marked for human review.`);
              return;
            }

            if (pr.draft) {
              try {
                await github.graphql(
                  `mutation($pullRequestId: ID!) {
                    markPullRequestReadyForReview(input: {pullRequestId: $pullRequestId}) {
                      pullRequest { number }
                    }
                  }`,
                  { pullRequestId: pr.node_id },
                );
                const refreshed = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });
                pr = refreshed.data;
              } catch (error) {
                core.warning(`Failed to mark PR #${pr.number} ready for review: ${error.message}`);
                return;
              }
            }

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId, mergeMethod: SQUASH}) {
                    pullRequest { number }
                  }
                }`,
                { pullRequestId: pr.node_id },
              );
              core.info(`Enabled auto-merge for PR #${pr.number}.`);
            } catch (error) {
              const autoMergeError = error.message || '';
              if (
                autoMergeError.includes('Pull request is in clean status') ||
                autoMergeError.includes('Auto merge is not allowed for this repository')
              ) {
                try {
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    merge_method: 'squash',
                  });
                  await closeLinkedIssues(pr.number, pr.body || '');
                  core.info(`Merged PR #${pr.number} directly because auto-merge is not available in this repository state.`);
                } catch (mergeError) {
                  await markForHumanReview(`PR #${pr.number} direct merge failed: ${mergeError.message}`);
                  core.setFailed(`PR #${pr.number} direct merge failed: ${mergeError.message}`);
                }
                return;
              }
              await markForHumanReview(`PR #${pr.number} auto-merge setup failed: ${error.message}`);
              core.setFailed(`Failed to enable auto-merge for PR #${pr.number}: ${error.message}`);
            }
